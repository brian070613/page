<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>📷 网站管理</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0a0a0a;color:#eee;min-height:100vh;padding:0 0 env(safe-area-inset-bottom,0);-webkit-font-smoothing:antialiased}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.92);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);padding:16px 20px 12px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.1rem;font-weight:500;letter-spacing:1px}
.header .status{font-size:0.7rem;color:#555}
.main{padding:20px;max-width:480px;margin:0 auto}
.card{background:#111;border-radius:14px;border:1px solid #1a1a1a;padding:16px;margin-bottom:16px}
.card-title{font-size:0.8rem;color:#666;letter-spacing:1px;margin-bottom:12px;font-weight:400}
.upload-zone{border:1.5px dashed #2a2a2a;border-radius:12px;padding:32px 16px;text-align:center;cursor:pointer;transition:all 0.3s;position:relative;background:#0e0e0e}
.upload-zone:active{background:#161616;border-color:#d4a853}
.upload-zone .icon{font-size:2rem;margin-bottom:8px;display:block}
.upload-zone .label{font-size:0.85rem;color:#888;font-weight:300}
.upload-zone .sublabel{font-size:0.7rem;color:#555;margin-top:4px}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
.preview-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.preview-item{position:relative;border-radius:8px;overflow:hidden;aspect-ratio:1;background:#1a1a1a}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .remove{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,0.6);border:none;color:#fff;font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cat-grid{display:flex;gap:8px}
.cat-btn{flex:1;padding:10px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:0.8rem;cursor:pointer;transition:all 0.2s;font-family:inherit;letter-spacing:1px;text-align:center}
.cat-btn.selected{background:#d4a85322;border-color:#d4a853;color:#d4a853}
.publish-btn{width:100%;padding:14px;border:none;border-radius:10px;background:#d4a853;color:#111;font-size:1rem;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;letter-spacing:1px;margin-top:4px}
.publish-btn:disabled{opacity:0.3;cursor:not-allowed}
.publish-btn:active:not(:disabled){transform:scale(0.98)}
.publish-btn.working{background:#333;color:#888}
.progress-bar{height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden;margin:12px 0}
.progress-bar .fill{height:100%;width:0%;background:linear-gradient(90deg,#d4a853,#f0d080);border-radius:2px;transition:width 0.3s}
.log{font-size:0.7rem;color:#555;line-height:1.6;max-height:150px;overflow-y:auto;font-family:monospace;white-space:pre-wrap;word-break:break-all}
.log .ok{color:#4caf50}
.log .err{color:#f44336}
.log .info{color:#888}
</style>
</head>
<body>
<div class="header">
  <h1>📷 网站管理</h1>
  <span class="status" id="headerStatus">就绪</span>
</div>
<div class="main">
  <div class="card" id="tokenCard">
    <div class="card-title">🔑 密钥（只需输入一次）</div>
    <input type="password" id="tokenInput" placeholder="粘贴密钥..." style="width:100%;padding:10px 12px;border-radius:8px;border:1px solid #2a2a2a;background:#0e0e0e;color:#eee;font-size:0.85rem;outline:none">
    <button onclick="saveToken()" style="margin-top:8px;padding:8px 20px;border-radius:8px;border:1px solid #d4a853;background:transparent;color:#d4a853;font-size:0.8rem;cursor:pointer">保存</button>
  </div>
  <div class="card">
    <div class="card-title">📸 选照片</div>
    <div class="upload-zone" id="uploadZone"><span class="icon">📁</span><div class="label">点我选照片</div><div class="sublabel">可以多选，自动压缩</div><input type="file" accept="image/*" multiple id="fileInput"></div>
    <div class="preview-grid" id="previewGrid"></div>
  </div>
  <div class="card">
    <div class="card-title">🏷️ 放哪个图集</div>
    <div class="cat-grid">
      <button class="cat-btn selected" data-cat="daily">日常</button>
      <button class="cat-btn" data-cat="china-gt">China GT</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">🚀 发布</div>
    <button class="publish-btn" id="publishBtn" disabled>📤 上传并发布</button>
    <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
    <div class="log" id="logArea">等你的操作...</div>
  </div>
</div>
  <div style='text-align:center;font-size:0.7rem;color:#555;margin-top:-8px;margin-bottom:16px'><a href='#' onclick='localStorage.removeItem("gh_token");location.reload()' style='color:#888'>重置密钥</a></div>
<script>
const REPO='brian070613/page',BRANCH='main';
let selectedFiles=[],selectedCat='daily';

(function(){const s=localStorage.getItem('gh_token');if(s)document.getElementById('tokenInput').value=s})();
function saveToken(){const t=document.getElementById('tokenInput').value.trim();if(!t||t.length<30)return alert('密钥不完整');localStorage.setItem('gh_token',t);document.getElementById('tokenCard').style.display='none';log('密钥已保存 ✅','ok')}
function getToken(){return document.getElementById('tokenInput').value||localStorage.getItem('gh_token')}
function log(m,t){const e=document.getElementById('logArea'),p={ok:'✓',err:'✗'};(e.innerHTML)+='<span class="'+(t||'info')+'">'+(p[t]||'→')+' '+m+'</span>\n';e.scrollTop=e.scrollHeight}
function setStatus(t){document.getElementById('headerStatus').textContent=t}
function setProgress(p){document.getElementById('progressFill').style.width=p+'%'}
document.querySelectorAll('.cat-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.cat-btn').forEach(x=>x.classList.remove('selected'));b.classList.add('selected');selectedCat=b.dataset.cat}));
document.getElementById('fileInput').addEventListener('change',e=>{selectedFiles=[...selectedFiles,...Array.from(e.target.files)];renderPreviews();updateBtn();e.target.value=''});
function renderPreviews(){const g=document.getElementById('previewGrid');g.innerHTML='';selectedFiles.forEach((f,i)=>{const d=document.createElement('div');d.className='preview-item';const img=document.createElement('img');img.src=URL.createObjectURL(f);const btn=document.createElement('button');btn.className='remove';btn.textContent='✕';btn.onclick=()=>{selectedFiles.splice(i,1);renderPreviews();updateBtn()};d.appendChild(img);d.appendChild(btn);g.appendChild(d)})}
function updateBtn(){const b=document.getElementById('publishBtn');b.disabled=selectedFiles.length===0;b.textContent=selectedFiles.length?'📤 上传并发布（'+selectedFiles.length+' 张）':'📤 上传并发布'}
function compressImage(file){return new Promise(r=>{const fr=new FileReader();fr.onload=e=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height,m=2000;if(w>m||h>m){if(w>=h){h=h*m/w;w=m}else{w=w*m/h;h=m}}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);c.toBlob(b=>r(b),'image/jpeg',0.8)};img.src=e.target.result};fr.readAsDataURL(file)})}

document.getElementById('publishBtn').addEventListener('click',async()=>{
  if(!getToken()){alert('先输入密钥再发布');return}
  const TOKEN=getToken();const btn=document.getElementById('publishBtn');
  btn.disabled=true;btn.classList.add('working');btn.textContent='⏳ 处理中...';
  setStatus('上传中...');setProgress(0);document.getElementById('logArea').innerHTML='';
  const total=selectedFiles.length,uploaded=[];
  try{
    for(let i=0;i<total;i++){
      log('压缩 '+(i+1)+'/'+total+'...','info');
      const c=await compressImage(selectedFiles[i]),name='photo_'+Date.now()+'_'+i+'.jpg';
      log('上传 '+(i+1)+'/'+total,'info');setProgress(i/total*70);
      const b64=await new Promise(r=>{const fr=new FileReader();fr.onload=()=>r(fr.result.split(',')[1]);fr.readAsDataURL(c)});
      const resp=await fetch('https://api.github.com/repos/'+REPO+'/contents/photos/'+name,{method:'PUT',headers:{'Authorization':'***'+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({message:'Upload '+name,content:b64,branch:BRANCH})});
      if(!resp.ok)throw new Error((await resp.json()).message);
      uploaded.push(name);log('✓ '+name+' ('+(c.size/1024).toFixed(0)+'KB)','ok');setProgress((i+1)/total*70)
    }
    setProgress(75);log('更新网站...','info');
    
    // ★ 关键修复：用 raw 格式直接获取文件内容 ★
    const rawResp=await fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{headers:{'Authorization':'***'+TOKEN,'Accept':'application/vnd.github.v3.raw'}});
    const curContent=await rawResp.text();
    
    // 同时获取 SHA（需要带 json 头的请求）
    const metaResp=await fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{headers:{'Authorization':'***'+TOKEN}});
    const meta=await metaResp.json();
    const sha=meta.sha;
    
    const cat=selectedCat;
    const entries=uploaded.map(f=>'    { file: "'+f+'", cat: "'+cat+'" }');
    
    // 找 ALL_PHOTOS 数组结尾
    const marker='  ];';
    const idx=curContent.lastIndexOf(marker);
    const beforeTrim=curContent.slice(0,idx).trimEnd();
    // 始终补逗号
    const prefix=beforeTrim.endsWith(',')?'\n':',\n';
    const newContent=curContent.slice(0,idx)+prefix+entries.join(',\n')+'\n'+marker;
    
    // base64 编码（用 unescape/encodeURIComponent 正确处理中文）
    const b64content=btoa(unescape(encodeURIComponent(newContent)));
    
    const up=await fetch('https://api.github.com/repos/'+REPO+'/contents/index.html',{method:'PUT',headers:{'Authorization':'***'+TOKEN,'Content-Type':'application/json'},body:JSON.stringify({message:'📸 新增 '+uploaded.length+' 张照片',content:b64content,sha:sha,branch:BRANCH})});
    if(!up.ok){const err=await up.json();throw new Error(err.message||'更新失败')}
    
    setProgress(100);log('','info');log('🎉 全部完成！'+uploaded.length+' 张照片已发布','ok');log('分类：'+(cat==='china-gt'?'China GT':'日常'),'info');log('⏳ 等1-2分钟部署...','info');setStatus('完成 ✓');btn.textContent='✅ 发布成功';selectedFiles=[];renderPreviews();updateBtn()
  }catch(e){log('出错：'+e.message,'err');setStatus('失败 ✗');btn.textContent='❌ 重试';btn.disabled=false;btn.classList.remove('working')}
});
</script>
</body>
</html>
