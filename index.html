<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brian 摄影作品集</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --text: #eee;
    --text2: #999;
    --gold: #c9a96e;
    --r: 12px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* HEADER - minimal */
  .header {
    text-align: center;
    padding: 3rem 1rem 0.5rem;
  }
  .header h1 {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 600;
    letter-spacing: 6px;
    color: #fff;
  }
  .header h1::after {
    content: '';
    display: block;
    width: 28px; height: 1.5px;
    background: var(--gold);
    margin: 0.7rem auto;
  }
  .header p {
    color: var(--text2);
    font-size: 0.82rem;
    letter-spacing: 2px;
    font-weight: 300;
  }

  /* GALLERY - fluid waterfall */
  .gallery-wrap {
    max-width: 1500px;
    margin: 0 auto;
    padding: 2rem 12px 3rem;
  }
  .gallery {
    column-count: 4;
    column-gap: 14px;
  }

  .gallery-item {
    break-inside: avoid;
    margin-bottom: 14px;
    border-radius: var(--r);
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: #141414;
    transition: transform 0.4s cubic-bezier(0.25,0.46,0.45,0.94), box-shadow 0.4s;
    opacity: 0;
    transform: translateY(30px);
  }
  .gallery-item.show {
    animation: flowIn 0.7s ease forwards;
  }
  .gallery-item:hover {
    transform: scale(1.02) !important;
    box-shadow: 0 12px 50px rgba(0,0,0,0.6);
  }
  .gallery-item img {
    display: block;
    width: 100%;
    height: auto;
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .gallery-item img.loaded { opacity: 1; }

  /* Number badge */
  .gallery-item .num {
    position: absolute;
    top: 10px; right: 10px;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(4px);
    color: rgba(255,255,255,0.6);
    font-size: 0.65rem;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: 0;
    font-weight: 400;
    transition: opacity 0.3s;
  }
  .gallery-item:hover .num { opacity: 0.3; }

  @keyframes flowIn {
    0% { opacity: 0; transform: translateY(30px) scale(0.97); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* LIGHTBOX */
  .lb {
    display: none;
    position: fixed; z-index: 9999;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    justify-content: center; align-items: center;
    backdrop-filter: blur(15px);
  }
  .lb.active { display: flex; }
  .lb-inner {
    display: flex; flex-direction: column; align-items: center;
    max-width: 92vw; max-height: 95vh;
    animation: fadeIn 0.25s ease;
  }
  .lb-inner img {
    max-width: 100%; max-height: 80vh;
    object-fit: contain; border-radius: 8px;
    box-shadow: 0 0 60px rgba(0,0,0,0.7);
    transition: opacity 0.2s ease;
  }
  .lb-inner img[src=""] { opacity: 0; }
  .lb-info { text-align: center; margin-top: 0.8rem; }
  .lb-info .counter {
    font-size: 0.8rem; color: #555;
    letter-spacing: 1px;
  }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .lb-close {
    position: fixed; top: 20px; right: 25px;
    color: #fff; font-size: 2rem; cursor: pointer;
    opacity: 0.4; transition: opacity 0.2s;
    background: none; border: none; z-index: 10000; line-height: 1;
  }
  .lb-close:hover { opacity: 1; }
  .lb-nav {
    position: fixed; top: 50%; transform: translateY(-50%);
    color: #fff; font-size: 2.5rem; cursor: pointer;
    opacity: 0.2; transition: opacity 0.2s;
    background: none; border: none; z-index: 10000;
    padding: 1.5rem 0.8rem; user-select: none;
  }
  .lb-nav:hover { opacity: 0.7; }
  .lb-prev { left: 10px; }
  .lb-next { right: 10px; }

  .back-top {
    position: fixed; bottom: 25px; left: 25px;
    width: 38px; height: 38px;
    border-radius: 50%;
    border: 1px solid #222;
    background: #141414;
    color: #666;
    cursor: pointer; font-size: 1rem;
    z-index: 100;
    opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: center; justify-content: center;
  }
  .back-top.show { opacity: 0.5; }
  .back-top.show:hover { opacity: 1; background: var(--gold); color: #111; border-color: var(--gold); }

  footer {
    text-align: center; padding: 2rem;
    color: #444; font-size: 0.78rem;
    letter-spacing: 1px;
  }

  @media (max-width: 1100px) { .gallery { column-count: 3; } }
  @media (max-width: 768px) {
    .gallery { column-count: 2; column-gap: 10px; }
    .gallery-item { margin-bottom: 10px; }
    .header { padding: 2rem 1rem 0.5rem; }
    .lb-nav { font-size: 2rem; padding: 1rem 0.3rem; }
  }
  @media (max-width: 480px) { .gallery { column-count: 1; } }
</style>
</head>
<body>

<div class="header">
  <h1>镜头之下</h1>
  <p>Brian · <span id="totalPhotos">0</span> 张作品</p>
</div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
</div>

<button class="back-top" id="backTop">↑</button>

<footer>© 2026 Brian</footer>

<div class="lb" id="lb">
  <button class="lb-close" id="lbClose">&times;</button>
  <button class="lb-nav lb-prev" id="lbPrev">&#10094;</button>
  <button class="lb-nav lb-next" id="lbNext">&#10095;</button>
  <div class="lb-inner">
    <img id="lbImg" src="" alt="">
    <div class="lb-info">
      <div class="counter" id="lbCounter"></div>
    </div>
  </div>
</div>

<script>
(function() {
  var PHOTOS = ["\u5fae\u4fe1\u56fe\u7247_20260720105037_335_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105152_336_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105259_337_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105336_338_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105341_339_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105421_340_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105451_341_3(1).jpg","\u5fae\u4fe1\u56fe\u7247_20260720105456_342_3(1).jpg","\u5fae\u4fe1\u56fe\u7247_20260720105531_343_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105616_344_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105623_345_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105627_346_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105629_347_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105737_348_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105815_349_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105834_350_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105915_351_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720105941_352_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720110018_353_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720110125_355_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184633_357_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184718_358_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184719_359_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184720_360_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184721_361_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184722_362_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184723_363_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184724_364_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184725_365_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184726_366_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184727_367_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184728_368_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184729_369_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184730_370_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184731_371_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184732_372_3.jpg","\u5fae\u4fe1\u56fe\u7247_20260720184733_373_3.jpg"];

  // Shuffle
  for (var i = PHOTOS.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = PHOTOS[i]; PHOTOS[i] = PHOTOS[j]; PHOTOS[j] = t;
  }

  document.getElementById('totalPhotos').textContent = PHOTOS.length;

  var CDN = 'https://cdn.jsdelivr.net/gh/brian070613/page@main/photos/';
  var FALLBACK = 'photos/';

  function photoUrl(f) { return CDN + encodeURIComponent(f); }
  function fallback(el, f) { el.onerror = null; el.src = FALLBACK + encodeURIComponent(f); }

  var gallery = document.getElementById('gallery');
  var lb = document.getElementById('lb');
  var lbImg = document.getElementById('lbImg');
  var lbCounter = document.getElementById('lbCounter');
  var currentIdx = 0;
  var renderedPhotos = [];

  // Render each photo with staggered flow-in
  PHOTOS.forEach(function(file, index) {
    var item = document.createElement('div');
    item.className = 'gallery-item';

    var img = document.createElement('img');
    img.dataset.src = photoUrl(file);
    img.dataset.fallback = file;

    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          img.src = img.dataset.src;
          img.onload = function() { img.classList.add('loaded'); };
          img.onerror = function() { img.classList.add('loaded'); fallback(this, this.dataset.fallback); };
          obs.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });
    obs.observe(img);

    // Number badge
    var num = document.createElement('div');
    num.className = 'num';
    num.textContent = index + 1;

    item.appendChild(img);
    item.appendChild(num);

    // Staggered flow-in animation
    var delay = Math.random() * 300;
    setTimeout(function() {
      item.classList.add('show');
    }, delay);

    item.addEventListener('click', function() {
      openLb(index);
    });

    gallery.appendChild(item);
    renderedPhotos.push(item);
  });

  // LIGHTBOX
  function openLb(idx) {
    currentIdx = idx;
    updateLb();
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function updateLb() {
    var file = PHOTOS[currentIdx];
    lbImg.src = '';
    lbImg.dataset.fallback = file;
    lbImg.onerror = function() { fallback(this, this.dataset.fallback); };
    requestAnimationFrame(function() {
      lbImg.src = photoUrl(file);
    });
    lbCounter.textContent = (currentIdx + 1) + ' / ' + PHOTOS.length;
    history.replaceState(null, '', '#photo-' + (currentIdx + 1));
  }

  document.getElementById('lbClose').addEventListener('click', function() {
    lb.classList.remove('active');
    document.body.style.overflow = '';
    history.replaceState(null, '', window.location.pathname);
  });

  document.getElementById('lbPrev').addEventListener('click', function(e) {
    e.stopPropagation();
    currentIdx = (currentIdx - 1 + PHOTOS.length) % PHOTOS.length;
    updateLb();
  });

  document.getElementById('lbNext').addEventListener('click', function(e) {
    e.stopPropagation();
    currentIdx = (currentIdx + 1) % PHOTOS.length;
    updateLb();
  });

  lb.addEventListener('click', function(e) {
    if (e.target === lb) {
      lb.classList.remove('active');
      document.body.style.overflow = '';
      history.replaceState(null, '', window.location.pathname);
    }
  });

  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') {
      lb.classList.remove('active');
      document.body.style.overflow = '';
      history.replaceState(null, '', window.location.pathname);
    }
    if (e.key === 'ArrowLeft') {
      currentIdx = (currentIdx - 1 + PHOTOS.length) % PHOTOS.length;
      updateLb();
    }
    if (e.key === 'ArrowRight') {
      currentIdx = (currentIdx + 1) % PHOTOS.length;
      updateLb();
    }
  });

  var tx = 0;
  lbImg.addEventListener('touchstart', function(e) { tx = e.changedTouches[0].screenX; }, { passive: true });
  lbImg.addEventListener('touchend', function(e) {
    var d = e.changedTouches[0].screenX - tx;
    if (Math.abs(d) > 50) {
      d > 0 ? (currentIdx = (currentIdx - 1 + PHOTOS.length) % PHOTOS.length) : (currentIdx = (currentIdx + 1) % PHOTOS.length);
      updateLb();
    }
  }, { passive: true });

  // Back to top
  var backTop = document.getElementById('backTop');
  window.addEventListener('scroll', function() {
    backTop.classList.toggle('show', window.scrollY > 400);
  });
  backTop.addEventListener('click', function() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  // Hash link
  if (window.location.hash) {
    var m = window.location.hash.match(/photo-(\d+)/);
    if (m) {
      var n = parseInt(m[1]) - 1;
      if (n >= 0 && n < PHOTOS.length) {
        setTimeout(function() { openLb(n); }, 500);
      }
    }
  }
})();
</script>
</body>
</html>
