<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brian 摄影作品集</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #0a0a0a;
    color: #eee;
    min-height: 100vh;
  }

  header {
    text-align: center;
    padding: 3rem 1rem 1.5rem;
  }
  header h1 {
    font-size: 2.2rem;
    font-weight: 300;
    letter-spacing: 4px;
    color: #fff;
  }
  header p {
    color: #888;
    margin-top: 0.5rem;
    font-size: 0.95rem;
    letter-spacing: 1px;
  }

  .gallery {
    column-count: 4;
    column-gap: 12px;
    max-width: 1500px;
    margin: 2rem auto;
    padding: 0 12px;
  }
  .gallery-item {
    break-inside: avoid;
    margin-bottom: 12px;
    overflow: hidden;
    border-radius: 8px;
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: #1a1a1a;
  }
  .gallery-item:hover {
    transform: scale(1.02);
    box-shadow: 0 8px 30px rgba(0,0,0,0.6);
  }
  .gallery-item img {
    display: block;
    width: 100%;
    height: auto;
    opacity: 0;
    transition: opacity 0.5s ease;
  }
  .gallery-item img.loaded { opacity: 1; }
  .gallery-item .overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 2rem 1rem 1rem;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    opacity: 0;
    transition: opacity 0.3s ease;
    pointer-events: none;
  }
  .gallery-item:hover .overlay { opacity: 1; }
  .gallery-item .overlay span { font-size: 0.85rem; color: #ccc; }

  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.94);
    justify-content: center;
    align-items: center;
    cursor: zoom-out;
  }
  .lightbox.active { display: flex; }
  .lightbox img {
    max-width: 92vw;
    max-height: 92vh;
    object-fit: contain;
    border-radius: 4px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.95); }
    to { opacity: 1; transform: scale(1); }
  }
  .lightbox .close {
    position: absolute; top: 20px; right: 30px;
    font-size: 2rem; color: #fff; cursor: pointer;
    opacity: 0.6; transition: opacity 0.2s;
    background: none; border: none;
  }
  .lightbox .close:hover { opacity: 1; }
  .lightbox .nav {
    position: absolute; top: 50%; transform: translateY(-50%);
    font-size: 2.5rem; color: #fff; cursor: pointer;
    opacity: 0.4; transition: opacity 0.2s;
    background: none; border: none;
    padding: 1rem; user-select: none;
  }
  .lightbox .nav:hover { opacity: 1; }
  .lightbox .prev { left: 10px; }
  .lightbox .next { right: 10px; }
  .lightbox .counter {
    position: absolute; bottom: 30px; left: 50%;
    transform: translateX(-50%);
    color: #888; font-size: 0.9rem; letter-spacing: 1px;
  }

  footer {
    text-align: center;
    padding: 2rem;
    color: #555;
    font-size: 0.85rem;
  }

  @media (max-width: 1100px) { .gallery { column-count: 3; } }
  @media (max-width: 768px) {
    .gallery { column-count: 2; column-gap: 8px; padding: 0 8px; }
    .gallery-item { margin-bottom: 8px; }
    header h1 { font-size: 1.5rem; }
  }
  @media (max-width: 480px) { .gallery { column-count: 1; } }
</style>
</head>
<body>

<header>
  <h1>📷 作品集</h1>
  <p>点击照片查看大图</p>
</header>

<div class="gallery" id="gallery"></div>

<footer>© 2026 · Brian 摄影作品</footer>

<div class="lightbox" id="lightbox">
  <button class="close" id="lbClose">&times;</button>
  <button class="nav prev" id="lbPrev">&#10094;</button>
  <button class="nav next" id="lbNext">&#10095;</button>
  <img id="lbImg" src="" alt="预览">
  <div class="counter" id="lbCounter"></div>
</div>

<script>
(function() {
  var PHOTO_DIR = 'photos/';

  var photos = [
    "微信图片_20260720105037_335_3.jpg",
    "微信图片_20260720105152_336_3.jpg",
    "微信图片_20260720105259_337_3.jpg",
    "微信图片_20260720105336_338_3.jpg",
    "微信图片_20260720105341_339_3.jpg",
    "微信图片_20260720105421_340_3.jpg",
    "微信图片_20260720105451_341_3(1).jpg",
    "微信图片_20260720105456_342_3(1).jpg",
    "微信图片_20260720105531_343_3.jpg",
    "微信图片_20260720105616_344_3.jpg",
    "微信图片_20260720105623_345_3.jpg",
    "微信图片_20260720105627_346_3.jpg",
    "微信图片_20260720105629_347_3.jpg",
    "微信图片_20260720105737_348_3.jpg",
    "微信图片_20260720105815_349_3.jpg",
    "微信图片_20260720105834_350_3.jpg",
    "微信图片_20260720105915_351_3.jpg",
    "微信图片_20260720105941_352_3.jpg",
    "微信图片_20260720110018_353_3.jpg",
    "微信图片_20260720110107_354_3.jpg",
    "微信图片_20260720110125_355_3.jpg"
  ];

  function shuffle(a) {
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }
  photos = shuffle(photos);

  var gallery = document.getElementById('gallery');
  var lb = document.getElementById('lightbox');
  var lbImg = document.getElementById('lbImg');
  var lbCounter = document.getElementById('lbCounter');
  var lbClose = document.getElementById('lbClose');
  var lbPrev = document.getElementById('lbPrev');
  var lbNext = document.getElementById('lbNext');
  var idx = 0;

  photos.forEach(function(src, i) {
    var item = document.createElement('div');
    item.className = 'gallery-item';
    var img = document.createElement('img');
    img.dataset.src = PHOTO_DIR + encodeURIComponent(src);
    img.alt = '照片 ' + (i + 1);
    img.loading = 'lazy';

    var obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) {
        if (e.isIntersecting) {
          img.src = img.dataset.src;
          img.onload = function() { img.classList.add('loaded'); };
          img.onerror = function() { img.classList.add('loaded'); };
          obs.unobserve(img);
        }
      });
    }, { rootMargin: '200px' });
    obs.observe(img);

    var overlay = document.createElement('div');
    overlay.className = 'overlay';
    var span = document.createElement('span');
    span.textContent = '照片 ' + (i + 1);
    overlay.appendChild(span);
    item.appendChild(img);
    item.appendChild(overlay);
    item.addEventListener('click', function() { openLb(i); });
    gallery.appendChild(item);
  });

  function openLb(n) { idx = n; updateLb(); lb.classList.add('active'); document.body.style.overflow = 'hidden'; }
  function closeLb() { lb.classList.remove('active'); document.body.style.overflow = ''; }
  function updateLb() {
    lbImg.src = PHOTO_DIR + encodeURIComponent(photos[idx]);
    lbImg.alt = '照片 ' + (idx + 1);
    lbCounter.textContent = (idx + 1) + ' / ' + photos.length;
  }
  function prevLb() { idx = (idx - 1 + photos.length) % photos.length; updateLb(); }
  function nextLb() { idx = (idx + 1) % photos.length; updateLb(); }

  lbClose.addEventListener('click', closeLb);
  lbPrev.addEventListener('click', function(e) { e.stopPropagation(); prevLb(); });
  lbNext.addEventListener('click', function(e) { e.stopPropagation(); nextLb(); });
  lb.addEventListener('click', closeLb);
  lbImg.addEventListener('click', function(e) { e.stopPropagation(); });

  document.addEventListener('keydown', function(e) {
    if (!lb.classList.contains('active')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowLeft') prevLb();
    if (e.key === 'ArrowRight') nextLb();
  });

  var tx = 0;
  lbImg.addEventListener('touchstart', function(e) { tx = e.changedTouches[0].screenX; }, { passive: true });
  lbImg.addEventListener('touchend', function(e) {
    var d = e.changedTouches[0].screenX - tx;
    if (Math.abs(d) > 50) d > 0 ? prevLb() : nextLb();
  }, { passive: true });
})();
</script>
</body>
</html>
